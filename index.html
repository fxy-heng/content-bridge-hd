<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContentBridge 多平台内容发布工具</title>
    <meta name="theme-color" content="#1f5f68" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="项目概览">
        <div>
          <p class="eyebrow">ContentBridge</p>
          <h1>多平台内容发布工作台</h1>
          <p class="subtitle">一份原始内容，自动适配公众号、知乎、B站、小红书，并完成模拟发布。</p>
        </div>
        <div class="metric-row">
          <div>
            <strong id="platformCount">4</strong>
            <span>目标平台</span>
          </div>
          <div>
            <strong id="qualityScore">--</strong>
            <span>质量评分</span>
          </div>
          <div>
            <strong id="logCount">0</strong>
            <span>发布记录</span>
          </div>
        </div>
      </section>

      <section class="workspace">
        <form class="composer" id="composer">
          <div class="panel-title">
            <h2>原始内容</h2>
            <button type="button" id="loadSample">填入示例</button>
          </div>

          <label>
            内容模板
            <select id="templateSelect"></select>
          </label>

          <label>
            标题
            <input id="sourceTitle" name="title" maxlength="120" placeholder="例如：AI 工具如何提升内容创作效率" />
          </label>

          <label>
            正文
            <textarea id="sourceBody" name="body" rows="13" placeholder="输入准备发布的正文内容，系统会按平台自动改写格式和风格。"></textarea>
          </label>

          <div class="two-fields">
            <label>
              标签
              <input id="sourceTags" name="tags" placeholder="用逗号分隔，例如 AI工具,内容创作,效率" />
            </label>

            <label>
              封面图地址
              <input id="coverUrl" name="coverUrl" placeholder="可选 URL" />
            </label>
          </div>

          <div class="two-fields">
            <label>
              目标受众
              <input id="audience" name="audience" placeholder="例如 独立创作者、运营同学" />
            </label>

            <label>
              品牌语气
              <input id="voice" name="voice" placeholder="例如 专业、克制、可执行" />
            </label>
          </div>

          <label>
            行动引导
            <input id="cta" name="cta" placeholder="例如 欢迎收藏，并在评论区分享你的发布流程" />
          </label>

          <label>
            计划发布时间
            <input id="scheduleAt" name="scheduleAt" type="datetime-local" />
          </label>

          <fieldset>
            <legend>目标平台</legend>
            <div id="platformChoices" class="platform-choices"></div>
          </fieldset>

          <details class="extension-panel">
            <summary>扩展更多平台</summary>
            <div class="extension-grid">
              <label>
                平台 Key
                <input id="customKey" placeholder="例如 douyin" />
              </label>
              <label>
                平台名称
                <input id="customName" placeholder="例如 抖音" />
              </label>
              <label>
                标题上限
                <input id="customTitleMax" type="number" min="8" value="55" />
              </label>
              <label>
                标签上限
                <input id="customTagMax" type="number" min="1" value="8" />
              </label>
              <label>
                正文建议字数
                <input id="customBodyMin" type="number" min="1" value="60" />
              </label>
              <label>
                平台风格
                <input id="customTone" placeholder="例如 短视频口播" />
              </label>
              <label>
                发布类型
                <input id="customMode" placeholder="例如 短视频文案" />
              </label>
              <label class="choice">
                <input id="customCover" type="checkbox" /> 建议封面
              </label>
            </div>
            <div class="actions">
              <button type="button" id="addPlatform">添加平台</button>
              <button type="button" id="resetPlatforms">重置自定义平台</button>
            </div>
          </details>

          <div class="actions">
            <button type="button" class="primary" id="adaptButton">自动适配</button>
            <button type="button" id="saveDraft">保存草稿</button>
            <button type="button" id="publishButton">一键模拟发布</button>
            <button type="button" id="exportButton">导出 JSON</button>
            <button type="button" id="calendarButton">导出日历</button>
            <button type="button" id="importButton">导入工作区</button>
            <input id="importFile" class="hidden-file" type="file" accept="application/json" />
          </div>
        </form>

        <section class="preview-area">
          <div class="panel-title">
            <h2>平台预览</h2>
            <p id="summaryText">等待输入内容</p>
          </div>

          <section class="quality-panel" aria-label="内容质量建议">
            <div>
              <strong id="qualityHeadline">内容质量检查</strong>
              <p id="qualityHint">输入内容后会生成跨平台发布建议。</p>
            </div>
            <ul id="qualityList"></ul>
          </section>

          <div class="preview-grid" id="previewGrid"></div>
        </section>
      </section>

      <section class="insight-panel">
        <div class="panel-title">
          <h2>发布准备度</h2>
          <div class="panel-actions">
            <p id="readinessSummary">等待生成适配结果</p>
            <button type="button" id="readinessCsv">导出 CSV</button>
          </div>
        </div>
        <div id="readinessGrid" class="readiness-grid"></div>
        <div class="strategy-box">
          <strong id="strategyPrimary">推荐主平台：--</strong>
          <ul id="strategyList"></ul>
        </div>
      </section>

      <section class="log-panel">
        <div class="panel-title">
          <h2>发布日志</h2>
          <div class="panel-actions">
            <button type="button" id="logCsv">导出 CSV</button>
            <button type="button" id="clearLog">清空</button>
          </div>
        </div>
        <div id="publishLog" class="log-list"></div>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
