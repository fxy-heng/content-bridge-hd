<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContentBridge 多平台内容发布工具</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="项目概览">
        <div>
          <p class="eyebrow">ContentBridge</p>
          <h1>多平台内容发布工作台</h1>
        </div>
        <div class="status-strip">
          <span>公众号</span>
          <span>知乎</span>
          <span>B站</span>
          <span>小红书</span>
        </div>
      </section>

      <section class="workspace">
        <form class="composer" id="composer">
          <div class="panel-title">
            <h2>原始内容</h2>
            <button type="button" id="loadSample">填入示例</button>
          </div>

          <label>
            标题
            <input id="sourceTitle" name="title" maxlength="120" placeholder="例如：AI 工具如何提升内容创作效率" />
          </label>

          <label>
            正文
            <textarea id="sourceBody" name="body" rows="14" placeholder="输入准备发布的正文内容，系统会按平台自动改写格式和风格。"></textarea>
          </label>

          <label>
            标签
            <input id="sourceTags" name="tags" placeholder="用逗号分隔，例如 AI工具,内容创作,效率" />
          </label>

          <label>
            封面图地址
            <input id="coverUrl" name="coverUrl" placeholder="可选，例如 https://example.com/cover.png" />
          </label>

          <fieldset>
            <legend>目标平台</legend>
            <label class="choice"><input type="checkbox" name="platform" value="wechat" checked /> 公众号</label>
            <label class="choice"><input type="checkbox" name="platform" value="zhihu" checked /> 知乎</label>
            <label class="choice"><input type="checkbox" name="platform" value="bilibili" checked /> B站</label>
            <label class="choice"><input type="checkbox" name="platform" value="rednote" checked /> 小红书</label>
          </fieldset>

          <div class="actions">
            <button type="button" class="primary" id="adaptButton">自动适配</button>
            <button type="button" id="publishButton">一键模拟发布</button>
            <button type="button" id="exportButton">导出 JSON</button>
          </div>
        </form>

        <section class="preview-area">
          <div class="panel-title">
            <h2>平台预览</h2>
            <p id="summaryText">等待输入内容</p>
          </div>
          <div class="preview-grid" id="previewGrid"></div>
        </section>
      </section>

      <section class="log-panel">
        <div class="panel-title">
          <h2>发布日志</h2>
          <button type="button" id="clearLog">清空</button>
        </div>
        <div id="publishLog" class="log-list"></div>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
