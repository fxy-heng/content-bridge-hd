name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run check
      - run: npm test
      - run: npm run smoke

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd backend && npm install
      - run: cd backend && node --check server.js
      - run: cd backend && node --check routes/credentials.js
      - run: cd backend && node --check routes/wechat.js
      - run: cd backend && node --check routes/bilibili.js
      - run: cd backend && node --check routes/rednote.js
      - run: cd backend && node --check routes/zhihu.js
      - run: cd backend && node --check services/wechat-api.js
